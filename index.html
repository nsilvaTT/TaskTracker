<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Weekly Task Tracker",
  "schemaVersion": 1,
  "description": "Full weekly task tracker app with sub-tasks, due dates, partners, status and priority per project. Data persists per week via localStorage.",
  "mcpTools": [],
  "mcpServerNames": []
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Task Tracker</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f5f5f3;
    --card: #ffffff;
    --border: #e8e8e6;
    --text: #1a1a1a;
    --muted: #888;
    --green: #2d6a4f;
    --green-light: #eaf6f0;
    --green-mid: #52b788;
    --yellow: #b45309;
    --yellow-light: #fef3c7;
    --red: #b91c1c;
    --red-light: #fee2e2;
    --blue: #1d4ed8;
    --blue-light: #eff6ff;
    --gray-light: #f0f0ee;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* TOP BAR */
  .topbar {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar h1 { font-size: 17px; font-weight: 700; }
  .week-nav { display: flex; align-items: center; gap: 8px; }
  .week-nav button {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1.5px solid var(--border); background: white;
    cursor: pointer; font-size: 13px; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.15s; color: #555;
  }
  .week-nav button:hover { border-color: #aaa; background: #f5f5f5; }
  .week-range { font-size: 13px; font-weight: 600; color: #444; min-width: 160px; text-align: center; }
  .week-chip {
    font-size: 11px; font-weight: 700; padding: 3px 10px;
    border-radius: 999px; background: var(--green-light);
    color: var(--green); text-transform: uppercase; letter-spacing: 0.05em;
  }

  /* SUMMARY BAR */
  .summary-bar {
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-wrap { flex: 1; }
  .progress-track {
    height: 5px; background: var(--border); border-radius: 999px; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: linear-gradient(90deg, var(--green), var(--green-mid));
    border-radius: 999px; transition: width 0.4s ease;
  }
  .progress-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .stat-chips { display: flex; gap: 8px; flex-shrink: 0; }
  .stat-chip {
    font-size: 11px; font-weight: 600; padding: 4px 10px;
    border-radius: 999px; border: 1.5px solid var(--border);
    background: white; color: #666; white-space: nowrap;
  }

  /* PROJECTS GRID */
  .projects { padding: 0 24px 32px; display: flex; flex-direction: column; gap: 12px; }

  /* PROJECT CARD */
  .project-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow 0.15s;
  }
  .project-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }

  .project-header {
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }

  .project-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: white; transition: all 0.15s;
    cursor: pointer;
  }
  .project-check.done { background: var(--green); border-color: var(--green); }
  .project-check svg { display: none; }
  .project-check.done svg { display: block; }

  .project-title { font-size: 15px; font-weight: 600; flex: 1; }
  .project-card.all-done .project-title { color: #aaa; text-decoration: line-through; }

  .project-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .status-badge {
    font-size: 11px; font-weight: 700; padding: 3px 9px;
    border-radius: 999px; text-transform: uppercase; letter-spacing: 0.04em;
    cursor: pointer; transition: opacity 0.15s;
  }
  .status-badge:hover { opacity: 0.8; }
  .status-badge.on-track { background: var(--green-light); color: var(--green); }
  .status-badge.at-risk   { background: var(--yellow-light); color: var(--yellow); }
  .status-badge.blocked   { background: var(--red-light); color: var(--red); }
  .status-badge.done      { background: var(--green-light); color: var(--green); }

  .priority-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    cursor: pointer; transition: transform 0.15s;
  }
  .priority-dot:hover { transform: scale(1.3); }
  .priority-dot.high   { background: var(--red); }
  .priority-dot.medium { background: #f59e0b; }
  .priority-dot.low    { background: #94a3b8; }

  .subtask-count {
    font-size: 12px; color: var(--muted);
    background: var(--gray-light); padding: 2px 8px;
    border-radius: 999px;
  }

  .expand-arrow {
    font-size: 12px; color: var(--muted);
    transition: transform 0.2s;
  }
  .project-card.open .expand-arrow { transform: rotate(180deg); }

  /* PROJECT BODY */
  .project-body {
    display: none;
    border-top: 1px solid var(--border);
    padding: 16px 18px;
    gap: 16px;
    flex-direction: column;
  }
  .project-card.open .project-body { display: flex; }

  /* META ROW */
  .meta-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .meta-field { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 140px; }
  .meta-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .meta-input {
    font-size: 13px; font-family: inherit;
    border: 1.5px solid var(--border); border-radius: 8px;
    padding: 7px 10px; background: white; color: var(--text);
    outline: none; transition: border-color 0.15s; width: 100%;
  }
  .meta-input:focus { border-color: var(--green); }

  /* PARTNERS */
  .partners-wrap { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
  .partner-tag {
    font-size: 12px; font-weight: 500; padding: 3px 10px;
    background: var(--blue-light); color: var(--blue);
    border-radius: 999px; display: flex; align-items: center; gap: 5px;
  }
  .partner-tag button {
    background: none; border: none; cursor: pointer;
    color: var(--blue); font-size: 13px; line-height: 1;
    padding: 0; opacity: 0.6;
  }
  .partner-tag button:hover { opacity: 1; }
  .add-partner-input {
    font-size: 12px; font-family: inherit;
    border: 1.5px dashed var(--border); border-radius: 999px;
    padding: 3px 10px; background: white; color: var(--text);
    outline: none; width: 130px; transition: border-color 0.15s;
  }
  .add-partner-input:focus { border-color: var(--blue); border-style: solid; }
  .add-partner-input::placeholder { color: #bbb; }

  /* SUBTASKS */
  .subtasks-section { display: flex; flex-direction: column; gap: 8px; }
  .subtasks-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .subtask-list { display: flex; flex-direction: column; gap: 6px; }
  .subtask-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; background: var(--bg);
    border-radius: 8px; border: 1px solid transparent;
    transition: border-color 0.15s;
  }
  .subtask-item:hover { border-color: var(--border); }
  .subtask-cb {
    width: 16px; height: 16px; border-radius: 4px;
    border: 2px solid var(--border); flex-shrink: 0;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: white; transition: all 0.15s;
  }
  .subtask-cb.checked { background: var(--green); border-color: var(--green); }
  .subtask-cb.checked svg { display: block; }
  .subtask-cb svg { display: none; }
  .subtask-text {
    flex: 1; font-size: 13px; font-family: inherit;
    border: none; background: transparent; outline: none; color: var(--text);
    padding: 0;
  }
  .subtask-text.done-text { text-decoration: line-through; color: #bbb; }
  .subtask-delete {
    background: none; border: none; cursor: pointer;
    color: #ccc; font-size: 14px; padding: 0; line-height: 1;
    opacity: 0; transition: opacity 0.15s, color 0.15s;
  }
  .subtask-item:hover .subtask-delete { opacity: 1; }
  .subtask-delete:hover { color: var(--red); }

  .add-subtask-btn {
    display: flex; align-items: center; gap: 7px;
    padding: 7px 12px; border-radius: 8px;
    border: 1.5px dashed var(--border); background: transparent;
    font-size: 13px; color: var(--muted); cursor: pointer;
    font-family: inherit; transition: all 0.15s; width: fit-content;
  }
  .add-subtask-btn:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }

  /* STATUS PICKER POPOVER */
  .popover {
    position: fixed; z-index: 200;
    background: white; border: 1.5px solid var(--border);
    border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 6px; display: none; flex-direction: column; gap: 2px;
    min-width: 140px;
  }
  .popover.show { display: flex; }
  .popover-item {
    padding: 7px 12px; border-radius: 7px; cursor: pointer;
    font-size: 13px; font-weight: 500; transition: background 0.1s;
    display: flex; align-items: center; gap: 8px;
  }
  .popover-item:hover { background: var(--bg); }

  /* DONE MESSAGE */
  .done-banner {
    margin: 0 24px 16px;
    padding: 12px 18px;
    background: var(--green-light);
    border: 1.5px solid #b7dfc9;
    border-radius: var(--radius);
    font-size: 14px; font-weight: 600; color: var(--green);
    text-align: center; display: none;
    animation: fadeIn 0.4s ease;
  }
  .done-banner.show { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 999px; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <h1>Weekly Tasks</h1>
  <div class="week-nav">
    <button id="prev-week">&#8592;</button>
    <span class="week-range" id="week-range">—</span>
    <button id="next-week">&#8594;</button>
    <span class="week-chip" id="week-chip">This Week</span>
  </div>
</div>

<!-- SUMMARY BAR -->
<div class="summary-bar">
  <div class="progress-wrap">
    <div class="progress-label" id="progress-label">0 of 6 projects with all tasks done</div>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="stat-chips">
    <span class="stat-chip" id="chip-blocked">0 Blocked</span>
    <span class="stat-chip" id="chip-at-risk">0 At Risk</span>
    <span class="stat-chip" id="chip-done">0 Done</span>
  </div>
</div>

<div class="done-banner" id="done-banner">🎉 All projects complete — great week!</div>

<!-- PROJECTS -->
<div class="projects" id="projects-list"></div>

<!-- STATUS POPOVER -->
<div class="popover" id="status-popover">
  <div class="popover-item" data-status="on-track">
    <span style="width:8px;height:8px;border-radius:50%;background:#2d6a4f;display:inline-block"></span> On Track
  </div>
  <div class="popover-item" data-status="at-risk">
    <span style="width:8px;height:8px;border-radius:50%;background:#f59e0b;display:inline-block"></span> At Risk
  </div>
  <div class="popover-item" data-status="blocked">
    <span style="width:8px;height:8px;border-radius:50%;background:#b91c1c;display:inline-block"></span> Blocked
  </div>
  <div class="popover-item" data-status="done">
    <span style="width:8px;height:8px;border-radius:50%;background:#2d6a4f;display:inline-block"></span> Done
  </div>
</div>

<!-- PRIORITY POPOVER -->
<div class="popover" id="priority-popover">
  <div class="popover-item" data-priority="high">
    <span style="width:8px;height:8px;border-radius:50%;background:#b91c1c;display:inline-block"></span> High
  </div>
  <div class="popover-item" data-priority="medium">
    <span style="width:8px;height:8px;border-radius:50%;background:#f59e0b;display:inline-block"></span> Medium
  </div>
  <div class="popover-item" data-priority="low">
    <span style="width:8px;height:8px;border-radius:50%;background:#94a3b8;display:inline-block"></span> Low
  </div>
</div>

<script>
const PROJECTS = [
  { id: 'copilot',        name: 'Co-pilot' },
  { id: 'autoqa',         name: 'AutoQA' },
  { id: 'lowes-qa',       name: "Lowe's QA Program" },
  { id: 'pro-churn',      name: 'Pro Success Churn' },
  { id: 'smb-rubric',     name: 'Large Pro / SMB Rubric' },
  { id: 'churn-insights', name: 'Churn Insights & Reporting' },
];

// ─── Week helpers ─────────────────────────────────────────────────────────────
function getMonday(d) {
  const date = new Date(d);
  const day = date.getDay();
  date.setDate(date.getDate() - (day === 0 ? 6 : day - 1));
  date.setHours(0,0,0,0);
  return date;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function fmt(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function weekKey(monday) { return monday.toISOString().slice(0,10); }

let currentMonday = getMonday(new Date());

// ─── State ────────────────────────────────────────────────────────────────────
function loadWeek(monday) {
  try { return JSON.parse(localStorage.getItem('wtt_' + weekKey(monday))) || {}; }
  catch { return {}; }
}
function saveWeek(monday, data) {
  localStorage.setItem('wtt_' + weekKey(monday), JSON.stringify(data));
}
function getProject(monday, id) {
  const week = loadWeek(monday);
  return week[id] || { status: 'on-track', priority: 'medium', dueDate: '', partners: [], subtasks: [] };
}
function setProject(monday, id, proj) {
  const week = loadWeek(monday);
  week[id] = proj;
  saveWeek(monday, week);
}

// ─── Render ───────────────────────────────────────────────────────────────────
let openCards = new Set();
let activeStatusTarget = null;
let activePriorityTarget = null;

function render() {
  // Week labels
  const friday = addDays(currentMonday, 4);
  document.getElementById('week-range').textContent = fmt(currentMonday) + ' – ' + fmt(friday);
  const now = getMonday(new Date());
  const diff = (currentMonday - now) / (7*86400000);
  document.getElementById('week-chip').textContent =
    diff === 0 ? 'This Week' : diff === -1 ? 'Last Week' : diff === 1 ? 'Next Week' :
    fmt(currentMonday) + ' week';

  const list = document.getElementById('projects-list');
  list.innerHTML = '';

  let doneCount = 0, blockedCount = 0, atRiskCount = 0;

  PROJECTS.forEach(proj => {
    const p = getProject(currentMonday, proj.id);
    const allDone = p.subtasks.length > 0 && p.subtasks.every(s => s.done);
    if (allDone || p.status === 'done') doneCount++;
    if (p.status === 'blocked') blockedCount++;
    if (p.status === 'at-risk') atRiskCount++;

    const doneSubs = p.subtasks.filter(s => s.done).length;
    const totalSubs = p.subtasks.length;
    const isOpen = openCards.has(proj.id);

    const card = document.createElement('div');
    card.className = 'project-card' + (isOpen ? ' open' : '') + (allDone || p.status === 'done' ? ' all-done' : '');
    card.dataset.id = proj.id;

    const statusLabel = { 'on-track': 'On Track', 'at-risk': 'At Risk', 'blocked': 'Blocked', 'done': 'Done' }[p.status] || 'On Track';

    card.innerHTML = `
      <div class="project-header">
        <div class="project-check ${allDone || p.status==='done' ? 'done' : ''}" data-check="${proj.id}">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="project-title">${proj.name}</div>
        <div class="project-meta">
          ${p.dueDate ? `<span style="font-size:12px;color:var(--muted)">📅 ${formatDate(p.dueDate)}</span>` : ''}
          ${totalSubs > 0 ? `<span class="subtask-count">${doneSubs}/${totalSubs}</span>` : ''}
          <span class="priority-dot ${p.priority || 'medium'}" title="${p.priority || 'medium'} priority" data-priority-btn="${proj.id}"></span>
          <span class="status-badge ${p.status || 'on-track'}" data-status-btn="${proj.id}">${statusLabel}</span>
        </div>
        <span class="expand-arrow">▾</span>
      </div>
      <div class="project-body">
        <div class="meta-row">
          <div class="meta-field">
            <span class="meta-label">Due Date</span>
            <input type="date" class="meta-input" data-field="dueDate" data-id="${proj.id}" value="${p.dueDate || ''}">
          </div>
          <div class="meta-field">
            <span class="meta-label">Partners</span>
            <div class="partners-wrap" data-partners="${proj.id}">
              ${p.partners.map((name, i) => `
                <span class="partner-tag">
                  ${name}
                  <button data-remove-partner="${i}" data-partner-id="${proj.id}">×</button>
                </span>
              `).join('')}
              <input class="add-partner-input" placeholder="Add partner…" data-partner-input="${proj.id}">
            </div>
          </div>
        </div>
        <div class="subtasks-section">
          <span class="subtasks-label">Sub-tasks</span>
          <div class="subtask-list" data-subtasks="${proj.id}">
            ${p.subtasks.map((st, i) => `
              <div class="subtask-item" data-subtask-idx="${i}">
                <div class="subtask-cb ${st.done ? 'checked' : ''}" data-cb="${proj.id}" data-idx="${i}">
                  <svg width="9" height="7" viewBox="0 0 9 7" fill="none">
                    <path d="M1 3.5l2 2L8 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <input class="subtask-text ${st.done ? 'done-text' : ''}" value="${escHtml(st.text)}" placeholder="Task name…" data-st-text="${proj.id}" data-idx="${i}">
                <button class="subtask-delete" data-st-delete="${proj.id}" data-idx="${i}">×</button>
              </div>
            `).join('')}
          </div>
          <button class="add-subtask-btn" data-add-subtask="${proj.id}">+ Add sub-task</button>
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  // Progress
  const total = PROJECTS.length;
  const pct = Math.round((doneCount / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${doneCount} of ${total} projects complete`;
  document.getElementById('chip-blocked').textContent = `${blockedCount} Blocked`;
  document.getElementById('chip-at-risk').textContent = `${atRiskCount} At Risk`;
  document.getElementById('chip-done').textContent = `${doneCount} Done`;

  const banner = document.getElementById('done-banner');
  doneCount === total ? banner.classList.add('show') : banner.classList.remove('show');
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function escHtml(str) { return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ─── Events ───────────────────────────────────────────────────────────────────
document.getElementById('prev-week').addEventListener('click', () => {
  currentMonday = addDays(currentMonday, -7); render();
});
document.getElementById('next-week').addEventListener('click', () => {
  currentMonday = addDays(currentMonday, 7); render();
});

document.getElementById('projects-list').addEventListener('click', e => {
  // Toggle card open
  const header = e.target.closest('.project-header');
  if (header && !e.target.closest('[data-status-btn]') && !e.target.closest('[data-priority-btn]') && !e.target.closest('[data-check]')) {
    const id = header.closest('.project-card').dataset.id;
    openCards.has(id) ? openCards.delete(id) : openCards.add(id);
    render(); return;
  }

  // Check / uncheck whole project
  const check = e.target.closest('[data-check]');
  if (check) {
    const id = check.dataset.check;
    const p = getProject(currentMonday, id);
    p.status = p.status === 'done' ? 'on-track' : 'done';
    setProject(currentMonday, id, p);
    render(); return;
  }

  // Status badge click
  const statusBtn = e.target.closest('[data-status-btn]');
  if (statusBtn) {
    activeStatusTarget = statusBtn.dataset.statusBtn;
    const rect = statusBtn.getBoundingClientRect();
    showPopover('status-popover', rect);
    return;
  }

  // Priority dot click
  const priorityBtn = e.target.closest('[data-priority-btn]');
  if (priorityBtn) {
    activePriorityTarget = priorityBtn.dataset.priorityBtn;
    const rect = priorityBtn.getBoundingClientRect();
    showPopover('priority-popover', rect);
    return;
  }

  // Subtask checkbox
  const cb = e.target.closest('[data-cb]');
  if (cb) {
    const id = cb.dataset.cb; const idx = parseInt(cb.dataset.idx);
    const p = getProject(currentMonday, id);
    p.subtasks[idx].done = !p.subtasks[idx].done;
    setProject(currentMonday, id, p);
    render(); return;
  }

  // Delete subtask
  const del = e.target.closest('[data-st-delete]');
  if (del) {
    const id = del.dataset.stDelete; const idx = parseInt(del.dataset.idx);
    const p = getProject(currentMonday, id);
    p.subtasks.splice(idx, 1);
    setProject(currentMonday, id, p);
    render(); return;
  }

  // Add subtask
  const addSub = e.target.closest('[data-add-subtask]');
  if (addSub) {
    const id = addSub.dataset.addSubtask;
    const p = getProject(currentMonday, id);
    p.subtasks.push({ text: '', done: false });
    setProject(currentMonday, id, p);
    openCards.add(id);
    render();
    // Focus the new input
    setTimeout(() => {
      const inputs = document.querySelectorAll(`[data-st-text="${id}"]`);
      if (inputs.length) inputs[inputs.length - 1].focus();
    }, 50);
    return;
  }

  // Remove partner
  const removePartner = e.target.closest('[data-remove-partner]');
  if (removePartner) {
    const id = removePartner.dataset.partnerId; const idx = parseInt(removePartner.dataset.removePartner);
    const p = getProject(currentMonday, id);
    p.partners.splice(idx, 1);
    setProject(currentMonday, id, p);
    render(); return;
  }
});

// Input changes
document.getElementById('projects-list').addEventListener('change', e => {
  const field = e.target.dataset.field;
  if (field === 'dueDate') {
    const id = e.target.dataset.id;
    const p = getProject(currentMonday, id);
    p.dueDate = e.target.value;
    setProject(currentMonday, id, p);
    render();
  }
});

document.getElementById('projects-list').addEventListener('input', e => {
  // Subtask text edit
  const stText = e.target.dataset.stText;
  if (stText) {
    const idx = parseInt(e.target.dataset.idx);
    const p = getProject(currentMonday, stText);
    p.subtasks[idx].text = e.target.value;
    setProject(currentMonday, stText, p);
  }
});

document.getElementById('projects-list').addEventListener('keydown', e => {
  // Add partner on Enter
  const partnerInput = e.target.dataset.partnerInput;
  if (partnerInput && e.key === 'Enter') {
    const val = e.target.value.trim();
    if (val) {
      const p = getProject(currentMonday, partnerInput);
      p.partners.push(val);
      setProject(currentMonday, partnerInput, p);
      render();
    }
  }
  // Add new subtask on Enter
  const stText = e.target.dataset.stText;
  if (stText && e.key === 'Enter') {
    e.preventDefault();
    const p = getProject(currentMonday, stText);
    p.subtasks.push({ text: '', done: false });
    setProject(currentMonday, stText, p);
    openCards.add(stText);
    render();
    setTimeout(() => {
      const inputs = document.querySelectorAll(`[data-st-text="${stText}"]`);
      if (inputs.length) inputs[inputs.length - 1].focus();
    }, 50);
  }
});

// Popovers
function showPopover(id, rect) {
  closePopovers();
  const pop = document.getElementById(id);
  pop.classList.add('show');
  pop.style.top = (rect.bottom + window.scrollY + 6) + 'px';
  pop.style.left = rect.left + 'px';
}
function closePopovers() {
  document.querySelectorAll('.popover').forEach(p => p.classList.remove('show'));
}
document.addEventListener('click', e => {
  if (!e.target.closest('.popover') && !e.target.closest('[data-status-btn]') && !e.target.closest('[data-priority-btn]')) {
    closePopovers();
  }
});

document.getElementById('status-popover').addEventListener('click', e => {
  const item = e.target.closest('[data-status]');
  if (item && activeStatusTarget) {
    const p = getProject(currentMonday, activeStatusTarget);
    p.status = item.dataset.status;
    setProject(currentMonday, activeStatusTarget, p);
    closePopovers();
    render();
  }
});

document.getElementById('priority-popover').addEventListener('click', e => {
  const item = e.target.closest('[data-priority]');
  if (item && activePriorityTarget) {
    const p = getProject(currentMonday, activePriorityTarget);
    p.priority = item.dataset.priority;
    setProject(currentMonday, activePriorityTarget, p);
    closePopovers();
    render();
  }
});

render();
</script>
</body>
</html>
