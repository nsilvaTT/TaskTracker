<!DOCTYPE html>
<script type="application/json" id="cowork-artifact-meta">
{
  "name": "Weekly Task Tracker",
  "schemaVersion": 1,
  "description": "Full weekly task tracker app with sub-tasks, due dates, partners, status and priority per project. Data persists per week via localStorage.",
  "mcpTools": [],
  "mcpServerNames": []
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Task Tracker</title>
<style>
:root {
  color-scheme: light;
  --bg: #f6f6f4;
  --card: #ffffff;
  --border: #e4e4e2;
  --text: #111;
  --muted: #999;
  --accent: #1a56db;
  --accent-light: #eff6ff;
  --green: #166534;
  --green-bg: #dcfce7;
  --yellow: #92400e;
  --yellow-bg: #fef3c7;
  --red: #991b1b;
  --red-bg: #fee2e2;
  --purple: #5b21b6;
  --purple-bg: #ede9fe;
  --orange: #9a3412;
  --orange-bg: #ffedd5;
  --gray-bg: #f3f4f6;
  --radius: 14px;
  --shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* ── TOP HEADER ── */
.header {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  display: flex;
  align-items: center;
  height: 56px;
  gap: 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; flex: 1; }
.header-title span { color: var(--accent); }

.week-nav { display: flex; align-items: center; gap: 6px; }
.nav-btn {
  width: 28px; height: 28px; border-radius: 8px;
  border: 1px solid var(--border); background: white;
  cursor: pointer; font-size: 13px; display: flex;
  align-items: center; justify-content: center;
  color: #666; transition: all 0.12s;
}
.nav-btn:hover { background: var(--gray-bg); border-color: #ccc; }
.week-label {
  font-size: 13px; font-weight: 600; color: #333;
  min-width: 170px; text-align: center;
}
.this-week-chip {
  font-size: 11px; font-weight: 700; padding: 2px 9px;
  border-radius: 999px; background: var(--accent-light);
  color: var(--accent); letter-spacing: 0.03em;
}

/* ── STATS ROW ── */
.stats-row {
  padding: 14px 28px;
  display: flex;
  gap: 10px;
  align-items: center;
}
.stat-card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 100px;
}
.stat-val { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; }
.stat-label { font-size: 11px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
.stat-card.green .stat-val { color: var(--green); }
.stat-card.yellow .stat-val { color: var(--yellow); }
.stat-card.red .stat-val { color: var(--red); }

.progress-card {
  flex: 1;
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 16px;
}
.prog-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
.prog-label { font-size: 12px; font-weight: 600; color: #444; }
.prog-pct { font-size: 12px; font-weight: 700; color: var(--accent); }
.prog-track { height: 6px; background: var(--gray-bg); border-radius: 999px; overflow: hidden; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--accent), #60a5fa); border-radius: 999px; transition: width 0.4s ease; }

/* ── TABLE ── */
.table-wrap { padding: 0 28px 32px; }
.table-header {
  display: grid;
  grid-template-columns: 32px 1fr 110px 130px 130px 36px;
  gap: 0;
  padding: 8px 16px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.project-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: box-shadow 0.15s;
}
.project-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06); }

.project-row {
  display: grid;
  grid-template-columns: 32px 1fr 110px 130px 130px 36px;
  align-items: center;
  padding: 14px 16px;
  cursor: pointer;
  user-select: none;
  gap: 0;
}

.row-check {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: white; transition: all 0.15s; cursor: pointer;
}
.row-check.done { background: var(--green); border-color: var(--green); }
.row-check svg { display: none; }
.row-check.done svg { display: block; }

.row-name { font-size: 14px; font-weight: 600; padding-right: 12px; }
.project-card.all-done .row-name { color: #bbb; text-decoration: line-through; }

.priority-badge {
  font-size: 11px; font-weight: 700; padding: 3px 9px;
  border-radius: 6px; cursor: pointer; width: fit-content;
  transition: opacity 0.15s; letter-spacing: 0.02em;
}
.priority-badge:hover { opacity: 0.75; }
.priority-badge.p1 { background: var(--red-bg); color: var(--red); }
.priority-badge.p2 { background: var(--orange-bg); color: var(--orange); }
.priority-badge.p3 { background: var(--yellow-bg); color: var(--yellow); }
.priority-badge.p4 { background: var(--gray-bg); color: #666; }

.status-badge {
  font-size: 11px; font-weight: 700; padding: 3px 9px;
  border-radius: 6px; cursor: pointer; width: fit-content;
  transition: opacity 0.15s;
}
.status-badge:hover { opacity: 0.75; }
.status-badge.not-started { background: var(--gray-bg); color: #666; }
.status-badge.in-progress { background: var(--accent-light); color: var(--accent); }
.status-badge.partial     { background: var(--yellow-bg); color: var(--yellow); }
.status-badge.complete    { background: var(--green-bg); color: var(--green); }
.status-badge.blocked     { background: var(--red-bg); color: var(--red); }

.expand-btn {
  width: 24px; height: 24px; border-radius: 6px;
  background: var(--gray-bg); border: none; cursor: pointer;
  font-size: 11px; color: #888; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.15s; margin-left: auto;
}
.expand-btn:hover { background: var(--border); }
.project-card.open .expand-btn { background: var(--accent-light); color: var(--accent); }
.expand-icon { transition: transform 0.2s; }
.project-card.open .expand-icon { transform: rotate(180deg); }

/* ── DETAIL PANEL ── */
.detail-panel {
  display: none;
  border-top: 1px solid var(--border);
  background: #fafafa;
  padding: 20px;
  gap: 16px;
  flex-direction: column;
}
.project-card.open .detail-panel { display: flex; }

.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}
.detail-field { display: flex; flex-direction: column; gap: 5px; }
.detail-label {
  font-size: 10px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.07em;
}
.detail-input, .detail-textarea, .detail-select {
  font-size: 13px; font-family: inherit;
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 8px 10px; background: white; color: var(--text);
  outline: none; transition: border-color 0.15s; width: 100%;
}
.detail-input:focus, .detail-textarea:focus, .detail-select:focus { border-color: var(--accent); }
.detail-textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
.detail-select { cursor: pointer; }

/* PARTNERS */
.partners-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.partner-tag {
  font-size: 12px; font-weight: 500; padding: 3px 10px;
  background: var(--purple-bg); color: var(--purple);
  border-radius: 999px; display: flex; align-items: center; gap: 5px;
}
.partner-remove {
  background: none; border: none; cursor: pointer;
  color: var(--purple); font-size: 14px; line-height: 1; padding: 0; opacity: 0.5;
}
.partner-remove:hover { opacity: 1; }
.add-partner-input {
  font-size: 12px; font-family: inherit;
  border: 1.5px dashed var(--border); border-radius: 999px;
  padding: 3px 11px; background: white; color: var(--text);
  outline: none; width: 130px; transition: all 0.15s;
}
.add-partner-input:focus { border-color: var(--purple); border-style: solid; }
.add-partner-input::placeholder { color: #ccc; }

/* SUBTASKS */
.subtasks-section { display: flex; flex-direction: column; gap: 8px; }
.subtask-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px; background: white;
  border-radius: 8px; border: 1px solid var(--border);
}
.subtask-cb {
  width: 16px; height: 16px; border-radius: 4px;
  border: 2px solid var(--border); flex-shrink: 0;
  cursor: pointer; display: flex; align-items: center;
  justify-content: center; background: white; transition: all 0.15s;
}
.subtask-cb.checked { background: var(--accent); border-color: var(--accent); }
.subtask-cb.checked svg { display: block; }
.subtask-cb svg { display: none; }
.subtask-text {
  flex: 1; font-size: 13px; font-family: inherit;
  border: none; background: transparent; outline: none; color: var(--text);
}
.subtask-text.done-text { text-decoration: line-through; color: #bbb; }
.subtask-del {
  background: none; border: none; cursor: pointer;
  color: #ddd; font-size: 15px; padding: 0; line-height: 1;
  opacity: 0; transition: opacity 0.15s, color 0.15s;
}
.subtask-item:hover .subtask-del { opacity: 1; }
.subtask-del:hover { color: var(--red); }
.add-sub-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 8px;
  border: 1.5px dashed var(--border); background: transparent;
  font-size: 13px; color: var(--muted); cursor: pointer;
  font-family: inherit; transition: all 0.15s; width: fit-content;
}
.add-sub-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

/* FRIDAY OUTCOME tag */
.outcome-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.outcome-tag {
  font-size: 11px; font-weight: 700; padding: 3px 10px;
  border-radius: 6px; cursor: pointer; transition: all 0.12s;
  border: 1.5px solid transparent;
}
.outcome-tag.selected { border-color: currentColor; }
.outcome-tag.no-progress  { background: var(--gray-bg); color: #666; }
.outcome-tag.partial      { background: var(--yellow-bg); color: var(--yellow); }
.outcome-tag.full-progress{ background: var(--green-bg); color: var(--green); }
.outcome-tag.blocked      { background: var(--red-bg); color: var(--red); }

/* POPOVER */
.popover {
  position: fixed; z-index: 300;
  background: white; border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.12);
  padding: 5px; display: none; flex-direction: column;
  min-width: 160px;
}
.popover.show { display: flex; }
.pop-item {
  padding: 8px 12px; border-radius: 7px; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: background 0.1s;
  display: flex; align-items: center; gap: 8px; color: var(--text);
}
.pop-item:hover { background: var(--gray-bg); }
.pop-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* DONE BANNER */
.done-banner {
  margin: 0 28px 14px;
  padding: 12px 18px;
  background: var(--green-bg);
  border: 1px solid #86efac;
  border-radius: 10px;
  font-size: 14px; font-weight: 600; color: var(--green);
  text-align: center; display: none;
  animation: fadein 0.3s ease;
}
.done-banner.show { display: block; }
@keyframes fadein { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-title">QA <span>Task Tracker</span></div>
  <div class="week-nav">
    <button class="nav-btn" id="prev-week">&#8592;</button>
    <span class="week-label" id="week-label">—</span>
    <button class="nav-btn" id="next-week">&#8594;</button>
    <span class="this-week-chip" id="week-chip">This Week</span>
  </div>
</div>

<!-- STATS -->
<div class="stats-row">
  <div class="stat-card green">
    <div class="stat-val" id="stat-done">0</div>
    <div class="stat-label">Complete</div>
  </div>
  <div class="stat-card yellow">
    <div class="stat-val" id="stat-progress">0</div>
    <div class="stat-label">In Progress</div>
  </div>
  <div class="stat-card red">
    <div class="stat-val" id="stat-blocked">0</div>
    <div class="stat-label">Blocked</div>
  </div>
  <div class="progress-card">
    <div class="prog-top">
      <span class="prog-label" id="prog-label">Weekly Progress</span>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
</div>

<div class="done-banner" id="done-banner">🎉 All projects complete — great week, Narco!</div>

<!-- TABLE -->
<div class="table-wrap">
  <div class="table-header">
    <div></div>
    <div>Task</div>
    <div>Priority</div>
    <div>Status</div>
    <div>Est. Effort</div>
    <div></div>
  </div>
  <div id="projects-list"></div>
</div>

<!-- POPOVERS -->
<div class="popover" id="priority-pop">
  <div class="pop-item" data-val="p1"><span class="pop-dot" style="background:#991b1b"></span>P1 – Critical</div>
  <div class="pop-item" data-val="p2"><span class="pop-dot" style="background:#9a3412"></span>P2 – High</div>
  <div class="pop-item" data-val="p3"><span class="pop-dot" style="background:#92400e"></span>P3 – Medium</div>
  <div class="pop-item" data-val="p4"><span class="pop-dot" style="background:#6b7280"></span>P4 – Low</div>
</div>
<div class="popover" id="status-pop">
  <div class="pop-item" data-val="not-started"><span class="pop-dot" style="background:#9ca3af"></span>Not Started</div>
  <div class="pop-item" data-val="in-progress"><span class="pop-dot" style="background:#1a56db"></span>In Progress</div>
  <div class="pop-item" data-val="partial"><span class="pop-dot" style="background:#92400e"></span>Partial Progress</div>
  <div class="pop-item" data-val="complete"><span class="pop-dot" style="background:#166534"></span>Complete</div>
  <div class="pop-item" data-val="blocked"><span class="pop-dot" style="background:#991b1b"></span>Blocked</div>
</div>

<script>
const PROJECTS = [
  { id: 'copilot',        name: 'Co-pilot' },
  { id: 'autoqa',         name: 'AutoQA' },
  { id: 'lowes-qa',       name: "Lowe's QA Program" },
  { id: 'pro-churn',      name: 'Pro Success Churn' },
  { id: 'smb-rubric',     name: 'Large Pro / SMB Rubric' },
  { id: 'churn-insights', name: 'Churn Insights & Reporting' },
];

const PRIORITY_LABELS = { p1: 'P1 – Critical', p2: 'P2 – High', p3: 'P3 – Medium', p4: 'P4 – Low' };
const STATUS_LABELS   = { 'not-started': 'Not Started', 'in-progress': 'In Progress', 'partial': 'Partial Progress', 'complete': 'Complete', 'blocked': 'Blocked' };
const EFFORT_OPTS     = ['', 'Low', 'Medium', 'High'];
const OUTCOME_OPTS    = [
  { val: 'no-progress',   label: 'No Progress' },
  { val: 'partial',       label: 'Partial Progress' },
  { val: 'full-progress', label: 'Full Progress' },
  { val: 'blocked',       label: 'Blocked' },
];

// ─── Week helpers ─────────────────────────────────────────────────────────────
function getMonday(d) {
  const dt = new Date(d); const day = dt.getDay();
  dt.setDate(dt.getDate() - (day === 0 ? 6 : day - 1));
  dt.setHours(0,0,0,0); return dt;
}
function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate() + n); return r; }
function fmt(d) { return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); }
function fmtMonth(d) { return d.toLocaleDateString('en-US', { month: '2-digit', year: 'numeric' }); }
function weekKey(m) { return m.toISOString().slice(0,10); }

let currentMonday = getMonday(new Date());

// ─── Storage ──────────────────────────────────────────────────────────────────
function loadWeek(m) { try { return JSON.parse(localStorage.getItem('qatt_' + weekKey(m))) || {}; } catch { return {}; } }
function saveWeek(m, d) { localStorage.setItem('qatt_' + weekKey(m), JSON.stringify(d)); }
function getP(m, id) {
  return loadWeek(m)[id] || {
    priority: 'p2', status: 'not-started', effort: '',
    mondayGoal: '', fridayOutcome: '', notes: '',
    partners: [], subtasks: []
  };
}
function setP(m, id, p) { const w = loadWeek(m); w[id] = p; saveWeek(m, w); }

// ─── State ────────────────────────────────────────────────────────────────────
let openCards = new Set();
let activePriorityId = null, activeStatusId = null;

// ─── Render ───────────────────────────────────────────────────────────────────
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  const fri = addDays(currentMonday, 4);
  const now = getMonday(new Date());
  const diff = (currentMonday - now) / (7*86400000);
  document.getElementById('week-label').textContent = fmt(currentMonday) + ' – ' + fmt(fri);
  document.getElementById('week-chip').textContent = diff===0?'This Week':diff===-1?'Last Week':diff===1?'Next Week':fmt(currentMonday);

  let doneC=0, inProgC=0, blockedC=0;
  const list = document.getElementById('projects-list');
  list.innerHTML = '';

  PROJECTS.forEach(proj => {
    const p = getP(currentMonday, proj.id);
    const isOpen = openCards.has(proj.id);
    if (p.status === 'complete') doneC++;
    if (p.status === 'in-progress' || p.status === 'partial') inProgC++;
    if (p.status === 'blocked') blockedC++;

    const doneSubs = p.subtasks.filter(s=>s.done).length;
    const totalSubs = p.subtasks.length;

    const card = document.createElement('div');
    card.className = 'project-card' + (isOpen?' open':'') + (p.status==='complete'?' all-done':'');
    card.dataset.id = proj.id;

    const outcomeHtml = OUTCOME_OPTS.map(o =>
      `<span class="outcome-tag ${o.val} ${p.fridayOutcome===o.val?'selected':''}" data-outcome="${o.val}" data-oid="${proj.id}">${o.label}</span>`
    ).join('');

    const subtasksHtml = p.subtasks.map((st, i) => `
      <div class="subtask-item">
        <div class="subtask-cb ${st.done?'checked':''}" data-cb="${proj.id}" data-idx="${i}">
          <svg width="9" height="7" viewBox="0 0 9 7" fill="none"><path d="M1 3.5l2 2L8 1" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <input class="subtask-text ${st.done?'done-text':''}" value="${esc(st.text)}" placeholder="Sub-task…" data-st="${proj.id}" data-idx="${i}">
        <button class="subtask-del" data-stdel="${proj.id}" data-idx="${i}">×</button>
      </div>
    `).join('');

    const partnersHtml = p.partners.map((name, i) => `
      <span class="partner-tag">${esc(name)}<button class="partner-remove" data-premove="${proj.id}" data-idx="${i}">×</button></span>
    `).join('');

    card.innerHTML = `
      <div class="project-row">
        <div class="row-check ${p.status==='complete'?'done':''}" data-check="${proj.id}">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <div class="row-name">
          ${esc(proj.name)}
          ${totalSubs>0?`<span style="font-size:11px;color:var(--muted);font-weight:500;margin-left:8px">${doneSubs}/${totalSubs} tasks</span>`:''}
        </div>
        <div>
          <span class="priority-badge ${p.priority}" data-pbtn="${proj.id}">${PRIORITY_LABELS[p.priority]||'P2 – High'}</span>
        </div>
        <div>
          <span class="status-badge ${p.status}" data-sbtn="${proj.id}">${STATUS_LABELS[p.status]||'Not Started'}</span>
        </div>
        <div>
          <select class="detail-select" style="font-size:12px;padding:4px 8px;border-radius:6px" data-effort="${proj.id}">
            ${EFFORT_OPTS.map(e=>`<option value="${e}" ${p.effort===e?'selected':''}>${e||'— Select —'}</option>`).join('')}
          </select>
        </div>
        <div><button class="expand-btn" data-expand="${proj.id}"><span class="expand-icon">▾</span></button></div>
      </div>

      <div class="detail-panel">
        <div class="detail-grid">
          <div class="detail-field">
            <span class="detail-label">📅 Due Date</span>
            <input type="date" class="detail-input" data-due="${proj.id}" value="${p.dueDate||''}">
          </div>
          <div class="detail-field">
            <span class="detail-label">📌 Monday Goal</span>
            <textarea class="detail-textarea" data-monday="${proj.id}" placeholder="What do you want to achieve this week?">${esc(p.mondayGoal||'')}</textarea>
          </div>
          <div class="detail-field">
            <span class="detail-label">🗒️ Notes / Blockers</span>
            <textarea class="detail-textarea" data-notes="${proj.id}" placeholder="Any blockers or notes…">${esc(p.notes||'')}</textarea>
          </div>
        </div>

        <div class="detail-field">
          <span class="detail-label">✅ Friday Outcome</span>
          <div class="outcome-tags">${outcomeHtml}</div>
        </div>

        <div class="detail-field">
          <span class="detail-label">👥 Partners</span>
          <div class="partners-row">
            ${partnersHtml}
            <input class="add-partner-input" placeholder="Add partner, press Enter" data-pinput="${proj.id}">
          </div>
        </div>

        <div class="subtasks-section">
          <span class="detail-label">☑️ Sub-tasks</span>
          <div class="subtask-list">${subtasksHtml}</div>
          <button class="add-sub-btn" data-addsub="${proj.id}">+ Add sub-task</button>
        </div>
      </div>
    `;
    list.appendChild(card);
  });

  // Stats
  document.getElementById('stat-done').textContent = doneC;
  document.getElementById('stat-progress').textContent = inProgC;
  document.getElementById('stat-blocked').textContent = blockedC;
  const pct = Math.round((doneC / PROJECTS.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-label').textContent = `${doneC} of ${PROJECTS.length} complete`;
  document.getElementById('done-banner').classList.toggle('show', doneC === PROJECTS.length);
}

// ─── Events ───────────────────────────────────────────────────────────────────
document.getElementById('prev-week').addEventListener('click', () => { currentMonday = addDays(currentMonday,-7); render(); });
document.getElementById('next-week').addEventListener('click', () => { currentMonday = addDays(currentMonday, 7); render(); });

document.getElementById('projects-list').addEventListener('click', e => {
  // Expand
  const exp = e.target.closest('[data-expand]');
  if (exp) { const id=exp.dataset.expand; openCards.has(id)?openCards.delete(id):openCards.add(id); render(); return; }

  // Check
  const chk = e.target.closest('[data-check]');
  if (chk) { const id=chk.dataset.check; const p=getP(currentMonday,id); p.status=p.status==='complete'?'not-started':'complete'; setP(currentMonday,id,p); render(); return; }

  // Priority badge
  const pbtn = e.target.closest('[data-pbtn]');
  if (pbtn) { activePriorityId=pbtn.dataset.pbtn; showPop('priority-pop', pbtn); return; }

  // Status badge
  const sbtn = e.target.closest('[data-sbtn]');
  if (sbtn) { activeStatusId=sbtn.dataset.sbtn; showPop('status-pop', sbtn); return; }

  // Outcome tag
  const ot = e.target.closest('[data-outcome]');
  if (ot) { const id=ot.dataset.oid; const p=getP(currentMonday,id); p.fridayOutcome=p.fridayOutcome===ot.dataset.outcome?'':ot.dataset.outcome; setP(currentMonday,id,p); render(); return; }

  // Subtask cb
  const cb = e.target.closest('[data-cb]');
  if (cb) { const id=cb.dataset.cb; const idx=+cb.dataset.idx; const p=getP(currentMonday,id); p.subtasks[idx].done=!p.subtasks[idx].done; setP(currentMonday,id,p); render(); return; }

  // Delete subtask
  const stdel = e.target.closest('[data-stdel]');
  if (stdel) { const id=stdel.dataset.stdel; const idx=+stdel.dataset.idx; const p=getP(currentMonday,id); p.subtasks.splice(idx,1); setP(currentMonday,id,p); render(); return; }

  // Add subtask
  const addsub = e.target.closest('[data-addsub]');
  if (addsub) { const id=addsub.dataset.addsub; const p=getP(currentMonday,id); p.subtasks.push({text:'',done:false}); setP(currentMonday,id,p); openCards.add(id); render(); setTimeout(()=>{ const ins=document.querySelectorAll(`[data-st="${id}"]`); if(ins.length) ins[ins.length-1].focus(); },50); return; }

  // Remove partner
  const prem = e.target.closest('[data-premove]');
  if (prem) { const id=prem.dataset.premove; const idx=+prem.dataset.idx; const p=getP(currentMonday,id); p.partners.splice(idx,1); setP(currentMonday,id,p); render(); return; }
});

document.getElementById('projects-list').addEventListener('input', e => {
  const st = e.target.dataset.st;
  if (st) { const idx=+e.target.dataset.idx; const p=getP(currentMonday,st); p.subtasks[idx].text=e.target.value; setP(currentMonday,st,p); return; }

  const mon = e.target.dataset.monday;
  if (mon) { const p=getP(currentMonday,mon); p.mondayGoal=e.target.value; setP(currentMonday,mon,p); return; }

  const notes = e.target.dataset.notes;
  if (notes) { const p=getP(currentMonday,notes); p.notes=e.target.value; setP(currentMonday,notes,p); return; }
});

document.getElementById('projects-list').addEventListener('change', e => {
  const due = e.target.dataset.due;
  if (due) { const p=getP(currentMonday,due); p.dueDate=e.target.value; setP(currentMonday,due,p); render(); return; }

  const effort = e.target.dataset.effort;
  if (effort) { const p=getP(currentMonday,effort); p.effort=e.target.value; setP(currentMonday,effort,p); return; }
});

document.getElementById('projects-list').addEventListener('keydown', e => {
  const pi = e.target.dataset.pinput;
  if (pi && e.key==='Enter') { const v=e.target.value.trim(); if(v){const p=getP(currentMonday,pi); p.partners.push(v); setP(currentMonday,pi,p); render();} return; }
  const st = e.target.dataset.st;
  if (st && e.key==='Enter') { e.preventDefault(); const p=getP(currentMonday,st); p.subtasks.push({text:'',done:false}); setP(currentMonday,st,p); openCards.add(st); render(); setTimeout(()=>{ const ins=document.querySelectorAll(`[data-st="${st}"]`); if(ins.length) ins[ins.length-1].focus(); },50); }
});

// Popovers
function showPop(id, target) {
  closePopovers();
  const pop = document.getElementById(id);
  const r = target.getBoundingClientRect();
  pop.style.top = (r.bottom + window.scrollY + 5) + 'px';
  pop.style.left = r.left + 'px';
  pop.classList.add('show');
}
function closePopovers() { document.querySelectorAll('.popover').forEach(p=>p.classList.remove('show')); }
document.addEventListener('click', e => {
  if (!e.target.closest('.popover') && !e.target.closest('[data-pbtn]') && !e.target.closest('[data-sbtn]')) closePopovers();
});

document.getElementById('priority-pop').addEventListener('click', e => {
  const item = e.target.closest('[data-val]');
  if (item && activePriorityId) { const p=getP(currentMonday,activePriorityId); p.priority=item.dataset.val; setP(currentMonday,activePriorityId,p); closePopovers(); render(); }
});
document.getElementById('status-pop').addEventListener('click', e => {
  const item = e.target.closest('[data-val]');
  if (item && activeStatusId) { const p=getP(currentMonday,activeStatusId); p.status=item.dataset.val; setP(currentMonday,activeStatusId,p); closePopovers(); render(); }
});

render();
</script>
</body>
</html>
